name: Validate Hermes God Skill

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate bundle structure
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          skill = (root / 'SKILL.md').read_text(encoding='utf-8')
          assert skill.startswith('---\n')
          end = skill.find('\n---\n', 4)
          assert end > 0
          frontmatter = skill[4:end]
          assert re.search(r'(?m)^name:\s*god-skill\s*$', frontmatter)
          assert re.search(r'(?m)^description:', frontmatter)
          assert len(skill) <= 100_000
          for path in (
              'references/hermes-execution.md',
              'references/upstream-methodology.md',
              'references/upstream-persona-template.md',
              'references/upstream-validation-and-edge-cases.md',
              'templates/persona-skill.md',
              'templates/validation-artifact.md',
              'scripts/validate_persona_skill.py',
          ):
              assert (root / path).is_file(), path
          print('bundle structure: PASS')
          PY

      - name: Compile validator
        run: python3 -m py_compile scripts/validate_persona_skill.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate package metadata
        run: |
          node -e "const p=require('./package.json'); if(!p.name||!p.repository||!p.files) process.exit(1); console.log(p.name)"

      - name: Validate publish manifest
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          node - <<'NODE'
          const pack = require('/tmp/pack.json')[0]
          const paths = new Set(pack.files.map(file => file.path))
          for (const required of [
            'SKILL.md',
            'references/hermes-execution.md',
            'templates/persona-skill.md',
            'templates/validation-artifact.md',
            'scripts/validate_persona_skill.py'
          ]) {
            if (!paths.has(required)) throw new Error(`missing package file: ${required}`)
          }
          for (const forbidden of ['tests/test_validate_persona_skill.py', '.github/workflows/release.yml']) {
            if (paths.has(forbidden)) throw new Error(`development-only file packaged: ${forbidden}`)
          }
          console.log(`package manifest: PASS (${paths.size} files)`)
          NODE
